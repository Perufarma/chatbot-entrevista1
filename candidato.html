<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrevista de selección — RecruitAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#f7f5f0;--surface:#fff;--surface2:#f0ede7;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.13);--text:#1a1814;--muted:#7a7570;--accent2:#e8623a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:16px;width:100%;max-width:540px;overflow:hidden;}
.setup{padding:32px;display:flex;flex-direction:column;gap:20px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:36px;height:36px;background:var(--accent2);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;}
.title{font-family:'Syne',sans-serif;font-size:22px;font-weight:600;letter-spacing:-0.03em;line-height:1.2;}
.sub{font-size:13px;color:var(--muted);line-height:1.55;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
.form-group input{background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;width:100%;}
.form-group input:focus{border-color:var(--accent2);}
.job-option{padding:12px 14px;border:0.5px solid var(--border2);border-radius:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:12px;}
.job-option:hover{border-color:var(--accent2);background:#fdf0eb;}
.job-option.selected{border-color:var(--accent2);background:#fdf0eb;}
.job-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.job-option.selected .job-check{background:var(--accent2);border-color:var(--accent2);}
.job-check svg{display:none;width:10px;height:10px;}
.job-option.selected .job-check svg{display:block;}
.job-title{font-size:14px;font-weight:500;}
.job-dept{font-size:12px;color:var(--muted);margin-top:1px;}
.btn-start{padding:12px 24px;background:var(--accent2);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;width:100%;transition:opacity 0.15s;}
.btn-start:hover{opacity:0.88;}
/* Chat */
.chat{display:none;flex-direction:column;}
.chat-header{padding:14px 20px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.chat-h-name{font-size:13px;font-weight:500;}
.chat-h-sub{font-size:11px;color:var(--muted);}
.progress-track{height:2px;background:var(--surface2);}
.progress-fill{height:2px;background:var(--accent2);transition:width 0.5s ease;}
.messages{padding:16px;display:flex;flex-direction:column;gap:12px;min-height:340px;max-height:420px;overflow-y:auto;background:var(--bg);}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.msg{display:flex;flex-direction:column;gap:3px;max-width:80%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.bubble{padding:10px 14px;font-size:13px;line-height:1.6;border-radius:14px;}
.msg.bot .bubble{background:var(--surface);border:0.5px solid var(--border);border-radius:4px 14px 14px 14px;}
.msg.user .bubble{background:var(--accent2);color:white;border-radius:14px 14px 4px 14px;}
.msg-time{font-size:10px;color:var(--muted);padding:0 2px;}
.msg.user .msg-time{text-align:right;}
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input-row{padding:10px 12px;border-top:0.5px solid var(--border);display:flex;gap:8px;background:var(--surface);}
#userInput{flex:1;background:var(--bg);border:0.5px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;}
#userInput:focus{border-color:var(--accent2);}
#sendBtn{padding:9px 16px;background:var(--accent2);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;flex-shrink:0;}
#sendBtn:hover{opacity:.88;}
#sendBtn:disabled{opacity:.35;cursor:not-allowed;}
.btn-finish{font-size:12px;padding:5px 12px;background:transparent;border:0.5px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-finish:hover{border-color:var(--accent2);color:var(--accent2);}
/* Report */
.report{display:none;padding:24px;flex-direction:column;gap:16px;}
.score-row{display:flex;align-items:center;gap:14px;}
.score-ring{width:60px;height:60px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:18px;font-weight:500;flex-shrink:0;}
.rep-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;letter-spacing:-0.02em;}
.rep-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:8px;}
.rec-badge{font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;}
.dim-list{display:flex;flex-direction:column;gap:7px;}
.dim-row{display:flex;align-items:center;gap:10px;}
.dim-label{font-size:12px;color:var(--muted);width:140px;flex-shrink:0;}
.dim-track{flex:1;height:3px;background:var(--surface2);border-radius:2px;}
.dim-fill{height:3px;border-radius:2px;}
.dim-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);width:26px;text-align:right;}
.rep-block{background:var(--bg);border-radius:8px;padding:12px 14px;}
.rep-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px;}
.rep-text{font-size:13px;line-height:1.6;color:var(--muted);}
.no-jobs{font-size:13px;color:var(--muted);padding:8px 0;line-height:1.5;}
</style>
</head>
<body>
<div class="card">

  <!-- Setup -->
  <div class="setup" id="setupPanel">
    <div class="brand">
      <div class="brand-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="brand-name">RecruitAI</div>
    </div>
    <div><div class="title">Entrevista de selección</div><div class="sub" style="margin-top:6px;">Completa tu nombre y selecciona el puesto al que estás aplicando para comenzar.</div></div>
    <div class="form-group"><label>Tu nombre completo</label><input type="text" id="candNombre" placeholder="Ej: María Torres"></div>
    <div class="form-group">
      <label>Selecciona el puesto</label>
      <div id="jobList" style="display:flex;flex-direction:column;gap:8px;margin-top:2px;"></div>
    </div>
    <button class="btn-start" onclick="startInterview()">Comenzar entrevista →</button>
  </div>

  <!-- Chat -->
  <div class="chat" id="chatPanel">
    <div class="chat-header">
      <div><div class="chat-h-name" id="chatName">Entrevista</div><div class="chat-h-sub" id="chatSub">Pregunta 1 de 6</div></div>
      <button class="btn-finish" onclick="finishInterview()">Finalizar</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <textarea id="userInput" placeholder="Escribe tu respuesta y presiona Enter..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMsg()">Enviar</button>
    </div>
  </div>

  <!-- Report -->
  <div class="report" id="reportPanel"></div>

</div>

<script>
const TOTAL_Q = 6;
let jobs = [], selectedJobId = null, chatHistory = [], candName = '', qNum = 0, busy = false;
// API key is handled server-side via /api/chat

// Load jobs from recruiter's localStorage via shared origin
async function loadJobs() {
  const list = document.getElementById('jobList');
  list.innerHTML = '<div class="no-jobs">Cargando puestos...</div>';
  try {
    // Try server first
    const res = await fetch('/api/jobs');
    const data = await res.json();
    if (data.jobs && data.jobs.length) {
      jobs = data.jobs;
    } else {
      // Fallback to localStorage (same device)
      jobs = JSON.parse(localStorage.getItem('rjobs') || '[]');
    }
  } catch {
    jobs = JSON.parse(localStorage.getItem('rjobs') || '[]');
  }
  if (!jobs.length) {
    list.innerHTML = '<div class="no-jobs">No hay puestos disponibles en este momento. Contacta al reclutador.</div>';
    return;
  }
  list.innerHTML = jobs.map(j => `
    <div class="job-option" id="jo_${j.id}" onclick="selectJob(${j.id})">
      <div class="job-check"><svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="1,5 4,8 9,2"/></svg></div>
      <div><div class="job-title">${j.titulo}</div><div class="job-dept">${j.area||''}</div></div>
    </div>`).join('');
}

function selectJob(id) {
  document.querySelectorAll('.job-option').forEach(el => el.classList.remove('selected'));
  document.getElementById('jo_'+id)?.classList.add('selected');
  selectedJobId = id;
}

async function startInterview() {
  candName = document.getElementById('candNombre').value.trim();
  if (!candName) { alert('Por favor ingresa tu nombre'); return; }
  if (!selectedJobId) { alert('Selecciona el puesto al que aplicas'); return; }

  const job = jobs.find(j => j.id === selectedJobId);
  document.getElementById('setupPanel').style.display = 'none';
  const cp = document.getElementById('chatPanel');
  cp.style.display = 'flex'; cp.style.flexDirection = 'column';
  document.getElementById('chatName').textContent = candName + ' · ' + job.titulo;
  chatHistory = []; qNum = 0; updateProgress();
  await firstMessage(job);
}

function buildSystem(job) {
  return `Eres un entrevistador profesional y empático. Estás entrevistando a ${candName} para el puesto de ${job.titulo}${job.area?' ('+job.area+')':''}.

INFORMACIÓN DEL PUESTO:
${job.desc}
${job.exp?'Experiencia requerida: '+job.exp:''}
${job.skills?'Habilidades clave: '+job.skills:''}
${job.instrucciones?'\nINSTRUCCIONES ESPECÍFICAS DEL RECLUTADOR (síguelas con prioridad):\n'+job.instrucciones:''}

REGLAS DE CONDUCCIÓN:
- Haz exactamente ${TOTAL_Q} preguntas en total, UNA por turno.
- Genera preguntas específicas para este puesto. NO hagas preguntas genéricas.
- Mezcla: técnicas, comportamentales, situacionales y de motivación.
- Si la respuesta es vaga, pide un ejemplo concreto.
- Haz un breve comentario sobre cada respuesta antes de la siguiente pregunta.
- Sé cálido, profesional y conciso. Máximo 3-4 oraciones por turno.
- Responde SIEMPRE en español.
- Tras las ${TOTAL_Q} preguntas, agradece al candidato y menciona que recibirá retroalimentación.`;
}

async function callClaude(job, msgs) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:800, system:buildSystem(job), messages:msgs})
    });
    const d = await res.json();
    return d.content?.find(b=>b.type==='text')?.text || 'Error al conectar.';
  } catch { return 'Error de conexión. Intenta de nuevo.'; }
}

function addMsg(role, text) {
  const box = document.getElementById('messages');
  const t = new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  const d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${t}</div>`;
  box.appendChild(d); box.scrollTop = box.scrollHeight;
}
function showTyping() {
  const box = document.getElementById('messages');
  const t = document.createElement('div');
  t.id='typing'; t.className='typing';
  t.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  box.appendChild(t); box.scrollTop=box.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function updateProgress() {
  document.getElementById('progressFill').style.width = Math.min((qNum/TOTAL_Q)*100,100)+'%';
  document.getElementById('chatSub').textContent = qNum<TOTAL_Q ? `Pregunta ${qNum+1} de ${TOTAL_Q}` : 'Entrevista completada';
}

async function firstMessage(job) {
  showTyping();
  const init = `Inicia la entrevista. Saluda brevemente a ${candName}, menciona el puesto de ${job.titulo} y haz la primera pregunta.`;
  chatHistory.push({role:'user',content:init});
  const resp = await callClaude(job, chatHistory);
  hideTyping();
  chatHistory.push({role:'assistant',content:resp});
  addMsg('bot', resp);
  qNum=1; updateProgress();
}

async function sendMsg() {
  if (busy) return;
  const inp = document.getElementById('userInput');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value='';
  addMsg('user', txt);
  chatHistory.push({role:'user',content:txt});
  busy=true; document.getElementById('sendBtn').disabled=true;
  showTyping();
  const job = jobs.find(j=>j.id===selectedJobId);
  const resp = await callClaude(job, chatHistory);
  hideTyping();
  chatHistory.push({role:'assistant',content:resp});
  addMsg('bot', resp);
  qNum = Math.min(qNum+1, TOTAL_Q);
  updateProgress();
  busy=false; document.getElementById('sendBtn').disabled=false;
  if (qNum >= TOTAL_Q) {
    inp.disabled=true; document.getElementById('sendBtn').disabled=true;
    setTimeout(() => finishInterview(), 2000);
  }
}

async function finishInterview() {
  document.getElementById('chatPanel').style.display='none';
  const rp = document.getElementById('reportPanel');
  rp.style.display='flex'; rp.style.flexDirection='column';
  rp.innerHTML='<p style="font-size:13px;color:var(--muted);padding:8px 0;">Generando tu reporte de evaluación...</p>';
  const job = jobs.find(j=>j.id===selectedJobId);
  const transcript = chatHistory.filter((_,i)=>i>0).map(m=>`${m.role==='assistant'?'Entrevistador':candName}: ${m.content}`).join('\n\n');
  const prompt = `Analiza esta entrevista para el puesto de ${job.titulo} y evalúa al candidato ${candName}.
PUESTO: ${job.titulo} — ${job.desc}
${job.skills?'HABILIDADES CLAVE: '+job.skills:''}
TRANSCRIPCIÓN:\n${transcript}
Responde ÚNICAMENTE con JSON válido:
{"puntaje_general":número,"nivel":"Excelente"|"Bueno"|"Regular"|"Bajo","recomendacion":"Avanzar"|"Considerar"|"No avanzar","dimensiones":[{"nombre":"Comunicación","puntaje":número},{"nombre":"Conocimiento técnico","puntaje":número},{"nombre":"Experiencia relevante","puntaje":número},{"nombre":"Motivación y fit","puntaje":número}],"fortalezas":"texto","areas_mejora":"texto","resumen":"texto"}`;
  try {
    const res = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d = await res.json();
    const r = JSON.parse(d.content?.find(b=>b.type==='text')?.text.replace(/```json|```/g,'').trim());
    saveResult(r, job);
    renderReport(r, job);
  } catch { rp.innerHTML='<p style="color:#c0392b;font-size:13px;">Error al generar reporte. Intenta finalizar de nuevo.</p><button onclick="finishInterview()" style="margin-top:8px;padding:8px 16px;background:var(--accent2);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;">Reintentar</button>'; }
}

function saveResult(r, job) {
  const results = JSON.parse(localStorage.getItem('rresults')||'[]');
  results.push({
    fecha:new Date().toLocaleDateString('es-PE'), hora:new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}),
    candidato:candName, puesto:job.titulo, area:job.area||'', puntaje:r.puntaje_general, nivel:r.nivel, recomendacion:r.recomendacion,
    comunicacion:r.dimensiones.find(d=>d.nombre==='Comunicación')?.puntaje||'',
    conocimiento:r.dimensiones.find(d=>d.nombre==='Conocimiento técnico')?.puntaje||'',
    experiencia:r.dimensiones.find(d=>d.nombre==='Experiencia relevante')?.puntaje||'',
    motivacion:r.dimensiones.find(d=>d.nombre==='Motivación y fit')?.puntaje||'',
    fortalezas:r.fortalezas, areas_mejora:r.areas_mejora, resumen:r.resumen
  });
  localStorage.setItem('rresults', JSON.stringify(results));
}

function sCol(s){return s>=80?{b:'#2d7a4f',bg:'#edf7f1',bar:'#2d7a4f'}:s>=60?{b:'#b8760a',bg:'#fef8ee',bar:'#e09112'}:{b:'#c0392b',bg:'#fbeaea',bar:'#c0392b'};}
function rCol(r){return r==='Avanzar'?{bg:'#edf7f1',t:'#1e5c38'}:r==='Considerar'?{bg:'#fef8ee',t:'#7a5000'}:{bg:'#fbeaea',t:'#8b1f1f'};}

function renderReport(r, job) {
  const c=sCol(r.puntaje_general), rc=rCol(r.recomendacion);
  const dims=r.dimensiones.map(d=>{const dc=sCol(d.puntaje);return`<div class="dim-row"><span class="dim-label">${d.nombre}</span><div class="dim-track"><div class="dim-fill" style="width:${d.puntaje}%;background:${dc.bar}"></div></div><span class="dim-num">${d.puntaje}</span></div>`;}).join('');
  document.getElementById('reportPanel').innerHTML=`
    <div class="score-row">
      <div class="score-ring" style="border-color:${c.b};color:${c.b};background:${c.bg}">${r.puntaje_general}</div>
      <div><div class="rep-name">${candName}</div><div class="rep-meta">${job.titulo} · ${r.nivel}<span class="rec-badge" style="background:${rc.bg};color:${rc.t}">${r.recomendacion}</span></div></div>
    </div>
    <div class="dim-list">${dims}</div>
    <div class="rep-block"><div class="rep-label">Resumen</div><div class="rep-text">${r.resumen}</div></div>
    <div class="rep-block"><div class="rep-label">Fortalezas</div><div class="rep-text">${r.fortalezas}</div></div>
    <div class="rep-block"><div class="rep-label">Áreas de mejora</div><div class="rep-text">${r.areas_mejora}</div></div>
    <p style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0;">Gracias por completar la entrevista. El equipo de reclutamiento se pondrá en contacto contigo pronto.</p>`;
}

loadJobs();
</script>
</body>
</html>
